site_name: MühendisAl
site_description: AI Engineer Türkçe Öğrenme Platformu
site_author: Kemal
site_url: https://wiki.oluk.org/platform/
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: tr
  custom_dir: overrides
  palette:
    # Aşama 3.4: Anthropic koyu turuncu yumuşak palette (#D97757)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Karanlık moda geç
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Aydınlık moda geç
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - header.autohide
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

extra:
  generator: false
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/KarincaAI
      name: KarıncaAI - X (Twitter)
  status:
    new: Yeni eklendi
    deprecated: Eski

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: tr
  - glightbox
  # Aşama 6.1 — Material social plugin: otomatik og:image üretici
  - social:
      cards: true
      cards_layout_options:
        background_color: "#D97757"
        color: "#FFFFFF"
        font_family: Inter
  # Aşama 9.3 — RSS feed (bolum-* sayfaları için)
  - rss:
      match_path: "bolum-.+"
      date_from_meta:
        as_creation: date
      categories:
        - tags

hooks:
  - hooks/pre_build.py

